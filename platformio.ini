; ═══════════════════════════════════════════════════════════════════════════════
; ESP32-S3 Display Template — PlatformIO project configuration
; ═══════════════════════════════════════════════════════════════════════════════
;
; Hardware: Waveshare ESP32-S3-Touch-LCD-7 Rev 1.2
;           800×480 RGB parallel LCD · GT911 capacitive touch (I2C)
;           CH422G IO expander · 16MB flash · 8MB OPI PSRAM
;
; Display library: LovyanGFX  (RGB parallel bus — TFT_eSPI does not support it)
; UI toolkit:      LVGL 8.3
;
; All libraries live in lib/ and are committed to the repo.
; A fresh clone builds with zero downloads required.
; ═══════════════════════════════════════════════════════════════════════════════

[env:DISPLAY]
platform = espressif32@6.5.0
board     = esp32-s3-devkitc-1
framework = arduino
board_build.arduino.memory_type = qio_opi
board_build.flash_mode          = qio
board_build.psram_type          = opi
board_build.psram               = enabled
board_upload.flash_size    = 16MB
board_upload.maximum_size  = 16777216
board_build.flash_size     = 16MB
board_build.partitions     = partitions.csv
board_build.filesystem     = littlefs
monitor_speed   = 115200
upload_speed    = 921600
monitor_filters = esp32_exception_decoder
monitor_rts     = 0
monitor_dtr     = 0
build_type      = release
lib_deps        =
lib_ignore      =
build_flags     =
  -DBOARD_HAS_PSRAM
  -DCORE_DEBUG_LEVEL=0
  -D LV_CONF_INCLUDE_SIMPLE
  -I src
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_LOOP_STACK_SIZE=16384
  -DLV_LVGL_H_INCLUDE_SIMPLE
  -DAIRCRAFT_SYMBOL_SIZE=40
  -DAIRCRAFT_LIVE_DATA=1
  -DFIRMWARE_VERSION='"1.0.0"'
  -DPRODUCT_NAME='"MyProject"'
