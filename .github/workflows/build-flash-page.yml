name: Build & Deploy Flash Page

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build firmware
        run: pio run -e DISPLAY

      - name: Build LittleFS
        run: pio run -e DISPLAY -t buildfs

      - name: Assemble deploy folder
        run: |
          VERSION="${GITHUB_SHA::7}"
          BUILD_DATE="$(date -u '+%Y-%m-%d')"

          mkdir -p deploy/firmware

          cp .pio/build/DISPLAY/bootloader.bin deploy/firmware/bootloader.bin
          cp .pio/build/DISPLAY/partitions.bin  deploy/firmware/partitions.bin
          cp .pio/build/DISPLAY/firmware.bin    deploy/firmware/firmware.bin
          cp .pio/build/DISPLAY/littlefs.bin    deploy/firmware/littlefs.bin

          sed -e "s/%%VERSION%%/${VERSION}/g" \
              -e "s/%%BUILD_DATE%%/${BUILD_DATE}/g" \
              web/manifest.json > deploy/manifest.json

          sed -e "s/%%VERSION%%/${VERSION}/g" \
              -e "s/%%BUILD_DATE%%/${BUILD_DATE}/g" \
              web/index.html > deploy/index.html

          # Copy any static assets (images, etc.) from web/
          find web/ -type f ! -name "*.html" ! -name "*.json" \
            -exec cp {} deploy/ \;

          # Copy screenshots
          cp -r screenshots deploy/screenshots

          # Prevent Jekyll from processing the gh-pages branch
          touch deploy/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages
          force_orphan: true
